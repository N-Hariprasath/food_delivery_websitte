<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyFood – Your Cart</title>
    <meta name="description" content="Review your cart items and proceed to checkout." />
    <link rel="stylesheet" href="index.css" />
    <style>
        .page-title {
            padding: var(--sp-8) 0 var(--sp-4);
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: var(--sp-8);
            align-items: start;
            padding-bottom: var(--sp-16);
        }

        /* Cart Items */
        .cart-items-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
        }

        .cip-header {
            padding: var(--sp-5) var(--sp-6);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cart-item {
            display: flex;
            gap: var(--sp-4);
            padding: var(--sp-5) var(--sp-6);
            border-bottom: 1px solid var(--border);
            transition: background var(--t-fast);
            animation: slideUp 0.3s ease both;
        }

        .cart-item:hover {
            background: var(--bg-glass);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item-img {
            width: 80px;
            height: 80px;
            border-radius: var(--r-md);
            object-fit: cover;
            flex-shrink: 0;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .cart-item-restaurant {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: var(--sp-3);
        }

        .cart-item-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cart-item-price {
            font-weight: 800;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .cart-item-remove {
            background: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: color var(--t-fast);
        }

        .cart-item-remove:hover {
            color: var(--error);
        }

        /* Promo Code */
        .promo-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: var(--sp-5) var(--sp-6);
            margin-top: var(--sp-4);
        }

        .promo-input-row {
            display: flex;
            gap: var(--sp-3);
            margin-top: var(--sp-3);
        }

        .promo-input-row input {
            flex: 1;
        }

        .promo-applied {
            display: flex;
            align-items: center;
            gap: var(--sp-3);
            background: rgba(44, 182, 125, 0.1);
            border: 1px solid rgba(44, 182, 125, 0.3);
            border-radius: var(--r-md);
            padding: var(--sp-3) var(--sp-4);
            margin-top: var(--sp-3);
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--success);
        }

        /* Savings Banner */
        .savings-banner {
            background: linear-gradient(135deg, rgba(44, 182, 125, 0.12), rgba(44, 182, 125, 0.05));
            border: 1px solid rgba(44, 182, 125, 0.25);
            border-radius: var(--r-md);
            padding: var(--sp-3) var(--sp-4);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            margin-bottom: var(--sp-4);
        }

        /* Order Summary */
        .summary-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: var(--sp-5) var(--sp-6);
            position: sticky;
            top: calc(var(--header-h) + 16px);
        }

        .summary-panel h4 {
            margin-bottom: var(--sp-5);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-3) 0;
            font-size: 0.9rem;
        }

        .summary-row.total {
            font-size: 1.05rem;
            font-weight: 800;
            border-top: 1px solid var(--border);
            margin-top: var(--sp-3);
            padding-top: var(--sp-4);
        }

        .summary-row .discount {
            color: var(--success);
        }

        .summary-row .label {
            color: var(--text-secondary);
        }

        .delivery-info {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: var(--sp-3) var(--sp-4);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: var(--sp-4) 0;
        }

        @media (max-width: 900px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }

            .summary-panel {
                position: static;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="container">
            <div class="logo" onclick="navigate('index.html')" style="cursor:pointer">
                <div class="logo-icon">🍔</div>
                <span>MyFood</span>
            </div>
            <span style="font-weight:700;font-size:1.1rem;">Shopping Cart</span>
            <div class="header-actions">
                <button class="icon-btn" data-nav="cart">🛒<span class="cart-badge" id="cartBadge"
                        style="display:none">0</span></button>
                <div class="avatar-btn" data-nav="profile">H</div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-title">
            <h2>Your Cart 🛒</h2>
        </div>

        <!-- Main layout -->
        <div class="cart-layout" id="cartLayout">
            <!-- Left -->
            <div>
                <div class="cart-items-panel" id="cartItemsPanel">
                    <div class="cip-header">
                        <h4 id="cartRestaurantName">Items</h4>
                        <button class="btn btn-sm"
                            style="color:var(--error);font-size:0.75rem;background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.2)"
                            onclick="clearCartConfirm()">Clear All</button>
                    </div>
                    <div id="cartItemsList"></div>
                </div>

                <!-- Promo Code -->
                <div class="promo-panel">
                    <h4>🏷️ Promo Code</h4>
                    <div class="promo-input-row">
                        <input class="form-input" id="promoInput" placeholder="Enter promo code" />
                        <button class="btn btn-outline btn-sm" onclick="applyPromo()">Apply</button>
                    </div>
                    <div id="promoMsg"></div>
                </div>
            </div>

            <!-- Right – Summary -->
            <div class="summary-panel" id="summaryPanel">
                <h4>Order Summary</h4>
                <div id="savingsBanner" style="display:none" class="savings-banner">🎉 You're saving <span
                        id="savingsAmt"></span> on this order!</div>
                <div class="summary-row"><span class="label">Subtotal</span><span id="subtotalVal">₹0</span></div>
                <div class="summary-row"><span class="label">Delivery Fee</span><span id="deliveryVal">₹0</span></div>
                <div class="summary-row"><span class="label">GST & Taxes (5%)</span><span id="taxVal">₹0</span></div>
                <div class="summary-row" id="discountRow" style="display:none"><span class="label">Discount</span><span
                        class="discount" id="discountVal">-₹0</span></div>
                <div class="summary-row total"><span>Total</span><span id="totalVal">₹0</span></div>

                <div class="delivery-info">🕒 Estimated delivery <strong>28–38 minutes</strong></div>

                <button class="btn btn-primary btn-full btn-lg" onclick="navigate('checkout.html')">Proceed to Checkout
                    →</button>
                <button class="btn btn-ghost btn-full btn-sm" style="margin-top:var(--sp-3)"
                    onclick="navigate('index.html')">← Continue Shopping</button>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display:none">
            <div class="empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Add some delicious food to get started!</p>
            <button class="btn btn-primary" onclick="navigate('index.html')">Browse Restaurants</button>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html"><span>🏠</span>Home</a>
        <a href="cart.html" class="active"><span>🛒</span>Cart</a>
        <a href="tracking.html"><span>📦</span>Orders</a>
        <a href="profile.html"><span>👤</span>Profile</a>
    </nav>

    <script src="app.js"></script>
    <script>
        let promoDiscount = 0;
        const PROMOS = { MYFOOD50: 50, FIRST100: 100, SAVE20: 20 };

        function renderCart() {
            const cart = Cart.get();
            const empty = document.getElementById('emptyState');
            const layout = document.getElementById('cartLayout');

            if (!cart.length) {
                empty.style.display = 'block';
                layout.style.display = 'none';
                return;
            }
            empty.style.display = 'none';
            layout.style.display = 'grid';

            // Restaurant name
            if (cart.length) document.getElementById('cartRestaurantName').textContent = cart[0].restaurantName || 'Items';

            // Items list
            document.getElementById('cartItemsList').innerHTML = cart.map(item => `
      <div class="cart-item">
        <img src="${item.img}" alt="${item.name}" class="cart-item-img" onerror="this.src='images/f1.jpg'" />
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-restaurant">from ${item.restaurantName}</div>
          <div class="cart-item-bottom">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
              <span class="qty-count">${item.qty}</span>
              <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
            </div>
            <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
            <button class="cart-item-remove" onclick="removeItem(${item.id})" title="Remove">🗑️</button>
          </div>
        </div>
      </div>
    `).join('');

            // Summary
            const subtotal = Cart.getTotal();
            const restaurant = getRestaurant(cart[0].restaurantId);
            const deliveryFee = restaurant ? restaurant.deliveryFee : 30;
            const tax = Math.round(subtotal * 0.05);
            const total = subtotal + deliveryFee + tax - promoDiscount;

            document.getElementById('subtotalVal').textContent = formatPrice(subtotal);
            document.getElementById('deliveryVal').textContent = deliveryFee === 0 ? 'FREE 🎉' : formatPrice(deliveryFee);
            document.getElementById('taxVal').textContent = formatPrice(tax);
            document.getElementById('totalVal').textContent = formatPrice(Math.max(0, total));

            if (promoDiscount > 0) {
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountVal').textContent = '-' + formatPrice(promoDiscount);
                document.getElementById('savingsBanner').style.display = 'flex';
                document.getElementById('savingsAmt').textContent = formatPrice(promoDiscount);
            }

            // Store summary in localStorage for checkout page
            localStorage.setItem('myfood_order_summary', JSON.stringify({ subtotal, deliveryFee, tax, promoDiscount, total: Math.max(0, total) }));
        }

        function updateQty(id, delta) {
            const cart = Cart.get();
            const item = cart.find(c => c.id === id);
            if (!item) return;
            Cart.updateQty(id, item.qty + delta);
            renderCart();
        }

        function removeItem(id) {
            Cart.remove(id);
            Toast.show('Item removed from cart', 'error');
            renderCart();
        }

        function clearCartConfirm() {
            if (confirm('Clear all items from cart?')) { Cart.clear(); renderCart(); }
        }

        function applyPromo() {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            const msg = document.getElementById('promoMsg');
            if (PROMOS[code]) {
                promoDiscount = PROMOS[code];
                msg.innerHTML = `<div class="promo-applied">✅ Code applied! You save ${formatPrice(promoDiscount)}</div>`;
                Toast.show(`Promo code applied! Saving ${formatPrice(promoDiscount)} 🎉`, 'success');
                renderCart();
            } else {
                msg.innerHTML = `<div style="color:var(--error);font-size:0.82rem;margin-top:8px">❌ Invalid or expired promo code</div>`;
            }
        }

        renderCart();
    </script>
</body>

</html>
